
<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NBA Career Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'nba-blue': '#1d428a',
              'nba-red': '#c8102e',
              'nba-gray': '#6c757d',
              'background': '#121212',
              'surface': '#1e1e1e',
              'primary': '#f0f0f0',
              'secondary': '#a0a0a0',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            animation: {
              'slide-in': 'slide-in 0.5s ease-out forwards',
              'fade-in': 'fade-in 0.5s ease-out forwards',
              'pop-in': 'pop-in 0.4s ease-out forwards',
              'fade-out': 'fade-out 0.3s ease-out forwards',
              'pulse-strong': 'pulse-strong 1.5s infinite',
              'subtle-pulse': 'subtle-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'notification-enter': 'notification-enter 0.5s ease-out forwards',
              'notification-exit': 'notification-exit 0.5s ease-out forwards',
              'stock-change': 'stock-change 1.5s ease-in-out forwards',
              'background-pan': 'background-pan 60s linear infinite',
              'slide-up': 'slide-up 0.4s ease-out forwards',
            },
            keyframes: {
              'slide-in': {
                '0%': { transform: 'translateY(20px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              'fade-in': {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              'pop-in': {
                '0%': { transform: 'scale(0.95)', opacity: '0' },
                '100%': { transform: 'scale(1)', opacity: '1' },
              },
              'fade-out': {
                '0%': { opacity: '1' },
                '100%': { opacity: '0', visibility: 'hidden' },
              },
              'pulse-strong': {
                '0%, 100%': { transform: 'scale(1)', opacity: '1' },
                '50%': { transform: 'scale(1.05)', opacity: '0.9' },
              },
              'subtle-pulse': {
                '0%, 100%': { opacity: '1' },
                '50%': { opacity: '.8' },
              },
              'notification-enter': {
                '0%': { transform: 'translateY(100%)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              'notification-exit': {
                '0%': { transform: 'translateY(0)', opacity: '1' },
                '100%': { transform: 'translateY(100%)', opacity: '0' },
              },
              'stock-change': {
                '0%': { transform: 'translateY(10px) scale(0.9)', opacity: '0' },
                '20%': { transform: 'translateY(0) scale(1)', opacity: '1' },
                '80%': { transform: 'translateY(0) scale(1)', opacity: '1' },
                '100%': { transform: 'translateY(-10px) scale(0.9)', opacity: '0' },
              },
              'background-pan': {
                '0%': { backgroundPosition: '0% 50%' },
                '50%': { backgroundPosition: '100% 50%' },
                '100%': { backgroundPosition: '0% 50%' },
              },
              'slide-up': {
                '0%': { transform: 'translateY(100%)' },
                '100%': { transform: 'translateY(0)' },
              },
            }
          },
        },
      }
    </script>
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://js.puter.com/v2/" crossorigin="anonymous"></script>
    <style>
      /* Custom scrollbar for a better dark mode aesthetic */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1e1e1e; /* surface */
      }
      ::-webkit-scrollbar-thumb {
        background: #6c757d; /* nba-gray */
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #a0a0a0; /* secondary */
      }
      
      /* Visually hide scrollbar for a cleaner UI on request */
      body::-webkit-scrollbar {
        display: none;
      }
      body {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
        overflow-x: hidden;
      }

      /* Custom text selection color */
      ::selection {
        background-color: #1d428a; /* nba-blue */
        color: #f0f0f0; /* primary */
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",

  }
}
</script>

</head>

</body>
</html>
